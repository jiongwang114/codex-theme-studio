<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theme Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><span class="brand-mark">C</span><span>CODEDROBE</span></div>
        <nav>
          <button class="nav-item active" type="button"><span class="nav-icon">◈</span>主题库</button>
          <button class="nav-item" type="button"><span class="nav-icon">◇</span>制作主题</button>
          <button class="nav-item" type="button"><span class="nav-icon">▣</span>主题包</button>
        </nav>
        <div class="sidebar-bottom">
          <div class="target-card"><span class="target-dot"></span><div><strong>Codex Desktop</strong><small>CDP 已就绪</small></div></div>
          <button class="settings" type="button">设置 <span>⌘ ,</span></button>
        </div>
      </aside>

      <main>
        <header class="topbar">
          <div><p class="eyebrow">CODEX / 主题工作台</p><h1>主题库</h1></div>
          <div class="header-actions"><button class="icon-button" type="button" title="切换密度">↗</button><button class="primary" id="newTheme" type="button">+ 从图片创建</button></div>
        </header>

        <section class="active-strip">
          <div class="active-copy"><span class="live-pill"><i></i>当前生效</span><h2 id="activeName">Northern Lights</h2><p id="activeMeta">深色 · 玻璃面板 · 最后使用于刚刚</p></div>
          <div class="active-swatches" id="activeSwatches"></div>
          <div class="active-actions"><button class="ghost" id="restoreTheme" type="button">恢复原生</button><button class="apply" id="reapplyTheme" type="button">重新应用</button></div>
        </section>

        <section class="library-head"><div><h2>已保存的主题</h2><p><span id="themeCount">4</span> 个主题 · 所有主题均可随时切换</p></div><button class="sort" type="button">最近使用 <span>⌄</span></button></section>
        <section class="theme-grid" id="themeGrid"></section>
      </main>

      <aside class="preview-panel">
        <div class="preview-head"><div><p class="eyebrow">实时预览</p><h2 id="previewTitle">Northern Lights</h2></div><span class="preview-state">已应用</span></div>
        <div class="codex-preview" id="codexPreview">
          <div class="preview-windowbar"><span></span><span></span><span></span><b>codex</b><em>●</em></div>
          <div class="preview-layout"><div class="preview-rail"><i></i><i></i><i></i><i></i></div><div class="preview-content"><p>今天想构建什么？</p><div class="preview-prompt"><span>描述你的任务...</span><b>↑</b></div><div class="preview-lines"><i></i><i></i><i></i></div></div></div>
        </div>
        <div class="preview-info"><div><span>配色方案</span><strong id="schemeLabel">Aurora dark</strong></div><div><span>运行方式</span><strong>CDP · 可逆注入</strong></div></div>
        <button class="wide-apply" id="panelApply" type="button">应用此主题 <span>→</span></button>
        <p class="safe-note">主题仅在运行时注入，不修改 Codex 安装文件。</p>
      </aside>
    </div>

    <dialog id="creatorDialog">
      <form method="dialog" class="creator-card">
        <button class="close-dialog" value="cancel" aria-label="关闭" type="submit">×</button>
        <p class="eyebrow">新建主题</p><h2>从一张图片开始</h2><p class="dialog-copy">上传图片后将自动提取配色，并作为 Codex 的主题背景。</p>
        <label class="drop-zone" id="dropZone" for="imageInput"><input id="imageInput" accept="image/png,image/jpeg,image/webp" type="file" /><span class="upload-sign">↑</span><strong>选择图片或拖入这里</strong><small>PNG、JPG 或 WebP，建议横向图片</small></label>
        <div class="field"><label for="themeName">主题名称</label><input id="themeName" maxlength="32" placeholder="例如：青空协议" /></div>
        <div class="generated-palette" id="generatedPalette"><span></span><span></span><span></span><span></span><small>上传图片后自动生成配色</small></div>
        <button class="primary dialog-submit" id="saveTheme" type="button" disabled>创建并预览</button>
      </form>
    </dialog>
    <div class="toast" id="toast"></div>
    <script src="app.js"></script>
  </body>
</html>
